            'Run': [
                { label: 'Run Code (JS/HTML)', action: runCode, shortcut: 'F5' },
                { label: 'Run Python (Pyodide)', action: runPython },
                { label: 'Toggle Vim Mode', action: toggleVimMode }
            ],
            'Terminal': [
                { label: 'New Terminal', action: showTerminal, shortcut: 'Ctrl+Shift+`' },
                { label: 'Clear Terminal', action: clearTerminal },
                { divider: true },
                { label: 'Clone GitHub Repo', action: cloneGitHubRepo }
            ],
            'Theme': [
                { label: 'Toggle Dark/Light', action: toggleTheme },
                { divider: true },
                { label: 'Accent: Blue', action: () => applyAccent('#007acc') },
                { label: 'Accent: Purple', action: () => applyAccent('#a855f7') },
                { label: 'Accent: Orange', action: () => applyAccent('#f97316') },
                { label: 'Accent: Green', action: () => applyAccent('#22c55e') },
                { label: 'Accent: Red', action: () => applyAccent('#ef4444') }
            ],
            'Help': [
                { label: 'About VS Code Clone', action: () => alert('VS Code Web Clone\nVersion 2.0.0\nBuilt with HTML, CSS, JS, and Monaco Editor.') }
            ]
        };

        function toggleMenu(event, menuName) {
            event.stopPropagation();
            if (activeMenu === menuName) {
                closeMenu();
            } else {
                openMenu(event.currentTarget, menuName);
            }
        }

        function hoverMenu(event, menuName) {
            // Act like VS Code: if a menu is already open, hovering over another menu item switches to it
            if (activeMenu && activeMenu !== menuName) {
                openMenu(event.currentTarget, menuName);
            }
        }

        function openMenu(element, menuName) {
            activeMenu = menuName;

            // Highlight active menu item in the top bar
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('menu-active'));
            element.classList.add('menu-active');

            const rect = element.getBoundingClientRect();
            const dropdown = document.getElementById('menu-dropdown');

            dropdown.innerHTML = '';
            const items = topMenus[menuName] || [];

            items.forEach(item => {
                if (item.divider) {
                    const div = document.createElement('div');
                    div.className = 'my-1 border-b border-[#454545]';
                    dropdown.appendChild(div);
                    return;
                }
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between px-6 py-1.5 hover:bg-[#0060c0] hover:text-white cursor-pointer transition-colors duration-75 group';
                div.onclick = (e) => {
                    e.stopPropagation();
                    closeMenu();
                    if (item.action) item.action();
                };

                const labelSpan = document.createElement('span');
                labelSpan.innerText = item.label;
                div.appendChild(labelSpan);

                if (item.shortcut) {
                    const shortcutSpan = document.createElement('span');
                    shortcutSpan.className = 'ml-6 text-[#858585] group-hover:text-white text-[11px]';
                    shortcutSpan.innerText = item.shortcut;
                    div.appendChild(shortcutSpan);
                }

                dropdown.appendChild(div);
            });

            // Position exactly under the clicked menu item
            dropdown.style.left = `${rect.left}px`;
            dropdown.style.top = `${rect.bottom}px`;
            dropdown.classList.remove('hidden');
        }

        function toggleVimMode() {
            if (!editorInstance) return;
            isVimMode = !isVimMode;
            const statusBarVim = document.getElementById('status-vim');

            if (isVimMode) {
                const terminal = document.getElementById('terminal-panel');
                if (!isTerminalOpen) toggleTerminal();
                vimModeInstance = window.MonacoVim.initVimMode(editorInstance, document.getElementById('terminal-output'));
                statusBarVim.classList.remove('hidden');
            } else {
                if (vimModeInstance) {
                    vimModeInstance.dispose();
                    vimModeInstance = null;
                }
                statusBarVim.classList.add('hidden');
            }
        }

        function closeMenu() {
            activeMenu = null;
            document.getElementById('menu-dropdown').classList.add('hidden');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('menu-active'));
        }

        // Close menu if clicking anywhere else in the window
        document.addEventListener('click', closeMenu);

        // Initialize Monaco
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            // Setup custom VS Code Dark Theme overrides
            monaco.editor.defineTheme('vscode-clone-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [],
                colors: {
                    'editor.background': '#1e1e1e',
                    'editor.lineHighlightBackground': '#ffffff0a'
                }
            });

            const initialFile = fileSystem[currentFile];

            editorInstance = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: initialFile ? initialFile.content : '',
                language: initialFile ? initialFile.language : 'plaintext',
                theme: 'vscode-clone-dark',
                automaticLayout: true,
                minimap: { enabled: true, renderCharacters: false },
                fontSize: 14,
                fontFamily: "'Droid Sans Mono', 'monospace', monospace",
                lineHeight: 21,
                padding: { top: 12 },
                scrollBeyondLastLine: false,
                smoothScrolling: true,
                renderLineHighlight: "all",
                cursorBlinking: "smooth"
            });

            // Initial theme application to Monaco
            monaco.editor.setTheme(currentTheme === 'light' ? 'vs' : 'vscode-clone-dark');

            // Register Snippets
            monaco.languages.registerCompletionItemProvider('javascript', {
                provideCompletionItems: (model, position) => {
                    const word = model.getWordUntilPosition(position);
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };
                    return {
                        suggestions: userSnippets.map(s => ({
                            label: s.label,
                            kind: monaco.languages.CompletionItemKind.Snippet,
                            insertText: s.insertText,
                            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                            detail: s.detail,
                            range: range
                        }))
                    };
                }
            });

            // Load some basic IntelliSense (TypeScript Definitions)
            const commonTypes = `
                declare interface Object { toString(): string; }
                declare namespace React {
                    function createElement(tag: string, props: any, ...children: any[]): void;
                }
                declare function console.log(...args: any[]): void;
            `;
            monaco.languages.typescript.javascriptDefaults.addExtraLib(commonTypes, 'lib.d.ts');

            editorInstance.onDidChangeCursorPosition((e) => {
                document.getElementById('status-line-col').innerText = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });

            editorInstance.onDidChangeModelContent(() => {
                if (currentFile) {
                    fileSystem[currentFile].content = editorInstance.getValue();
                    saveState();
                    if (fileHandles[currentFile]) syncFileToDisk(currentFile);
                    if (isPreviewOpen) updatePreview();
                    refreshOutline();
                }
            });

            // Register Formatting Providers
            monaco.languages.registerDocumentFormattingEditProvider('javascript', {
                provideDocumentFormattingEdits(model) {
                    try {
                        const text = model.getValue();
                        const formatted = prettier.format(text, { parser: "babel", plugins: prettierPlugins });
                        return [{ range: model.getFullModelRange(), text: formatted }];
                    } catch (e) { return []; }
                }
            });
            monaco.languages.registerDocumentFormattingEditProvider('html', {
                provideDocumentFormattingEdits(model) {
                    try {
                        const text = model.getValue();
                        const formatted = prettier.format(text, { parser: "html", plugins: prettierPlugins });
                        return [{ range: model.getFullModelRange(), text: formatted }];
                    } catch (e) { return []; }
                }
            });
            monaco.languages.registerDocumentFormattingEditProvider('css', {
                provideDocumentFormattingEdits(model) {
                    try {
                        const text = model.getValue();
                        const formatted = prettier.format(text, { parser: "css", plugins: prettierPlugins });
                        return [{ range: model.getFullModelRange(), text: formatted }];
                    } catch (e) { return []; }
                }
            });

            // Sidebar and Editor split (Horizontal)
            Split(['#sidebar-container', '#editor-wrapper'], {
                sizes: [20, 80],
                minSize: [150, 200],
                gutterSize: 2,
                onDrag: () => { if (editorInstance) editorInstance.layout(); }
            });

            // Note: Vertical split for terminal is now handled in toggleTerminal()
        });

        updateBreadcrumbsAndStatus();
        renderFileTree();
        renderTabs();
        refreshOutline();

    </script>
</body>

</html>
